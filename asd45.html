<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Archiwum</title>
    <style>
        body {
            margin: 0;
            background: #0b0b0b;
            color: #e0e0e0;
            font-family: "Courier New", monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        h1 {
            color: #ff4d4d;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-align: center;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 600px;
        }

        .file {
            background: #111;
            border: 2px solid #8b0000;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file:hover {
            background: #1a1a1a;
            border-color: #ff4d4d;
        }

        #inputBox {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #inputBox p {
            text-align: center;
            margin-bottom: 10px;
        }

        .panel {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .panel input {
            width: 40px;
            height: 50px;
            background: #111;
            border: 2px solid #8b0000;
            color: #e0e0e0;
            font-size: 24px;
            text-align: center;
            outline: none;
        }

        .panel input:focus {
            border-color: #ff4d4d;
        }

        #message {
            margin-top: 15px;
            font-size: 14px;
            color: #ff4d4d;
            min-height: 20px;
            text-align: center;
        }

        .blink {
            animation: blink 1.5s infinite;
        }

        @keyframes blink {

            0%,
            50%,
            100% {
                opacity: 1;
            }

            25%,
            75% {
                opacity: 0;
            }
        }

        #nextPage {
            background: #111;
            border: 2px solid #555;
            color: #e0e0e0;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: all 0.2s;
            width: 260px;
            box-sizing: border-box;
            border-color: #8b0000;
        }

        #nextPage:hover {
            border-color: #ff4d4d;
        }

        .centered-paragraph {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #e0e0e0;
            font-weight: normal;
            font-size: 16px;
            font-family: "Courier New", monospace;
            text-align: center;
            margin: 0;
        }
    </style>
</head>

<body>

    <h1>ARCHIWUM - PLIKI DOSTĘPNE DO POBRANIA</h1>

    <div class="file-list">
        <div class="file" data-file="Doc513.jpg" download>Obiekt 513<span>Pobierz</span></div>
        <div class="file" data-file="Doc096.jpg" download>Obiekt 096<span>Pobierz</span></div>
        <div class="file" data-file="Doc035.jpg" download>Obiekt 035<span>Pobierz</span></div>
        <div class="file" data-file="eras3.txt" download>Plik ERAS-3<span>Pobierz</span></div>
    </div>

    <button id="nextPage">Poprzednia strona</button>

    <script>
        if (sessionStorage.getItem("siteDestroyed") === "true") {
            document.body.innerHTML = "<p class='centered-paragraph'>Witryna niedostępna</p>";
            throw "";
        }
        // Pobieranie plików
        const files = document.querySelectorAll("div.file");
        files.forEach(file => {
            file.addEventListener("click", () => {
                const link = document.createElement('a');
                link.href = file.dataset.file;
                link.download = file.dataset.file;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });
        });

        // Przycisk do następnej strony
        document.getElementById("nextPage").addEventListener("click", () => {
            window.location.href = "bty22.html";
        });
    </script>

</body>

</html>
