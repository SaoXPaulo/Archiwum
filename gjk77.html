<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <title>Archiwum</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: #e0e0e0;
      font-family: "Courier New", monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    #container {
      text-align: center;
      max-width: 600px;
    }

    h1 {
      color: #ff4d4d;
      letter-spacing: 3px;
      margin-bottom: 30px;
    }

    input {
      width: 90%;
      padding: 15px;
      background: #111;
      border: 2px solid #8b0000;
      color: #e0e0e0;
      font-family: "Courier New", monospace;
      font-size: 18px;
      outline: none;
      text-align: center;
    }

    input:focus {
      border-color: #ff4d4d;
    }

    #message {
      margin-top: 20px;
      color: #ff4d4d;
      min-height: 20px;
    }

    .blink {
      animation: blink 1.5s infinite;
    }

    @keyframes blink {

      0%,
      50%,
      100% {
        opacity: 1;
      }

      25%,
      75% {
        opacity: 0;
      }
    }

    .centered-paragraph {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #e0e0e0;
      font-weight: normal;
      font-size: 16px;
      font-family: "Courier New", monospace;
      text-align: center;
      margin: 0;
    }
  </style>
</head>

<body>

  <div id="container">
    <h1>PROTOKÓŁ SAMOZNISZCZENIA</h1>
    <p>Wpisz frazę autoryzacyjną, aby wymazać witrynę</p>
    <input type="text" id="codeInput" placeholder="Wpisz hasło" autocomplete="off">
    <div id="message"></div>
  </div>

  <script>
    const destroyCode = "łBC41łt2DŁC5ócłBĆ28łdCĄVŁ2"; // ← TU ustawiasz hasło

    // Jeśli witryna już zniszczona
    if (sessionStorage.getItem("siteDestroyed") === "true") {
      document.body.innerHTML = "<p class='centered-paragraph'>Witryna niedostępna</p>";
      throw "";
    }

    const input = document.getElementById("codeInput");
    const message = document.getElementById("message");

    input.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        check();
      }
    });

    function check() {
      if (input.value.trim() === destroyCode) {
        sessionStorage.setItem("siteDestroyed", "true");

        document.body.innerHTML = `
        <h1 style="color:#ff4d4d; text-align:center;">
            PROTOKÓŁ WYKONANY<br><br>Witryna uległa zniszczeniu
        </h1>`;

        setTimeout(() => {
          const link = document.createElement("a");
          link.href = "warning.txt"; // lokalny plik na serwerze
          link.download = "warning.txt"; // nazwa pliku przy pobieraniu
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          document.body.innerHTML = "<p class='centered-paragraph'>Witryna niedostępna</p>";
        }, 2500);

      } else {
        message.textContent = "BŁĘDNE HASŁO";
        message.classList.add("blink");
        input.value = "";

        setTimeout(() => {
          message.classList.remove("blink");
        }, 1500);
      }
    }
  </script>

</body>

</html>
