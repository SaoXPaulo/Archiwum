<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>1625</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #0b0b0b;
            color: #e0e0e0;
            font-family: "Courier New", monospace;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            max-width: 500px;
            padding: 30px 40px;
            line-height: 1.6;
            position: relative;
        }

        .warning {
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .panel {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .panel input {
            width: 50px;
            height: 60px;
            background: #111;
            border: 2px solid #8b0000;
            color: #e0e0e0;
            font-size: 32px;
            text-align: center;
            outline: none;
            transition: all 0.2s;
        }

        .panel input:focus {
            border-color: #ff4d4d;
        }

        .message {
            margin-top: 30px;
            min-height: 20px;
            color: #ff4d4d;
            font-weight: bold;
        }

        .blink {
            animation: blink 1.5s infinite;
        }

        @keyframes blink {

            0%,
            50%,
            100% {
                opacity: 1;
            }

            25%,
            75% {
                opacity: 0;
            }
        }

        .centered-paragraph {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #e0e0e0;
            font-weight: normal;
            font-size: 16px;
            font-family: "Courier New", monospace;
            text-align: center;
            margin: 0;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="warning">
            <p>DOSTĘP OGRANICZONY</p>
            <p>Ten terminal wymaga autoryzacji.</p>
        </div>

        <div class="panel">
            <input maxlength="1" inputmode="numeric">
            <input maxlength="1" inputmode="numeric">
            <input maxlength="1" inputmode="numeric">
            <input maxlength="1" inputmode="numeric">
        </div>

        <div class="message blink" id="msg"></div>

    </div>

    <script>
        if (sessionStorage.getItem("siteDestroyed") === "true") {
            document.body.innerHTML = "<p class='centered-paragraph'>Witryna niedostępna</p>";
            throw "";
        }
        console.log("Muszę przestać zapisywać hasła w dziwnych miejscach.")
        const inputs = document.querySelectorAll(".panel input");
        const message = document.getElementById("msg");

        const correctCode = "1625";
        const MAX_ATTEMPTS = 5;

        // Inicjalizacja prób w sesji
        if (!sessionStorage.getItem("attempts")) {
            sessionStorage.setItem("attempts", "0");
        }

        // Blokada terminala
        function lockTerminal() {
            document.body.innerHTML = `
      <div style="text-align:center;">
        <p>DOSTĘP ZABLOKOWANY</p>
        <p>Limit prób został przekroczony.</p>
      </div>
    `;
        }

        // Sprawdzenie blokady przy starcie
        if (parseInt(sessionStorage.getItem("attempts")) >= MAX_ATTEMPTS) {
            lockTerminal();
        }

        // Obsługa inputów
        inputs.forEach((input, index) => {
            input.addEventListener("input", () => {
                input.value = input.value.replace(/[^0-9]/g, "");

                if (input.value && inputs[index + 1]) {
                    inputs[index + 1].focus();
                }

                checkCode();
            });

            input.addEventListener("keydown", e => {
                if (e.key === "Backspace" && !input.value && inputs[index - 1]) {
                    inputs[index - 1].focus();
                }
            });
        });

        function checkCode() {
            let entered = "";
            inputs.forEach(i => entered += i.value);

            if (entered.length === 4) {
                if (entered === correctCode) {
                    sessionStorage.removeItem("attempts");

                    document.body.innerHTML = `
                <div style="text-align:center;">
                    <p>Autoryzacja przyjęta</p>
                </div>
            `;

                    setTimeout(() => {
                        window.location.href = "bjk76.html";
                    }, 3000);

                } else {
                    let attempts = parseInt(sessionStorage.getItem("attempts"));
                    attempts++;
                    sessionStorage.setItem("attempts", attempts);

                    if (attempts >= MAX_ATTEMPTS) {
                        lockTerminal();
                        return;
                    }

                    // Wyświetlamy migający komunikat tylko przy błędzie
                    message.textContent = `BŁĘDNY KOD (${MAX_ATTEMPTS - attempts} PRÓB POZOSTAŁO)`;
                    message.classList.add("blink");

                    // Wyzeruj pola input
                    inputs.forEach(i => i.value = "");
                    inputs[0].focus();

                    // Po 1,5s przestajemy migotać
                    setTimeout(() => {
                        message.classList.remove("blink");
                    }, 1500);
                }
            }
        }

    </script>


</body>

</html>
